<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/70">
    <div class="bg-[#1f1f1f] p-6 rounded-lg max-w-md w-full shadow-lg">
      <h3 class="text-lg font-bold mb-2 text-white">Are you sure?</h3>
      <p class="text-sm text-gray-300 mb-4">
        Once deleted, this Entry cannot be recovered.
      </p>
      <div class="flex justify-end space-x-4">
        <button (click)="deleteThisTable(false)"
          class="px-4 py-2 bg-gray-700 hover:bg-gray-600 cursor-pointer rounded text-white"
        >
          Cancel
        </button>
        <button (click)="deleteThisTable(true)"
          class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded cursor-pointer text-white"
        >
          Yes, I Agree
        </button>
      </div>
    </div>
  </div>
